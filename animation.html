<!DOCTYPE html>
<html>
    <head>
        <style>
            @keyframes example {
                0% {background-color: tomato;}
                25% {background-color: cornflowerblue;}
                50% {background-color: seagreen;}
                75% {background-color: crimson;}
                100% {background-color: salmon;}
            }
            div {
                width: 400px;
                height: 400px;
                background-color: darkcyan;
                animation-name: example;
                animation-duration: 4s;
            }
        </style>
    </head>
    <body>
        <div>
            jtygyitdbuybuns
        </div>
    </body>
</html>
